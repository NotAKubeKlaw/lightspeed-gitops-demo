apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-app
  namespace: lightspeed-demo
  labels:
    app: vulnerable-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable-app
  template:
    metadata:
      labels:
        app: vulnerable-app
    spec:
      containers:
        - name: web
          image: docker.io/library/nginx:1.21
          ports:
            - containerPort: 80
