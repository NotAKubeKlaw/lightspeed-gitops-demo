apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-app
  namespace: gitops-demo
  labels:
    app: vulnerable-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable-app
  template:
    metadata:
      labels:
        app: vulnerable-app
    spec:
      containers:
        - name: web
          image: registry.access.redhat.com/ubi9/nginx-124:latest
          ports:
            - containerPort: 8080
